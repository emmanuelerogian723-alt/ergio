<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERGIO — Website Gallery</title>
<meta name="description" content="Explore real websites built with ERGIO AI. Clone any site as your starting point.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--cyan:#00D9FF;--purple:#8B5CF6;--card:#161629;--border:rgba(255,255,255,.08);--bg:#08080F}
*{font-family:'Space Grotesk',sans-serif;box-sizing:border-box}
body{background:var(--bg);color:#fff;margin:0}
.glow{position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:800px;height:400px;background:radial-gradient(ellipse,rgba(0,217,255,.15),transparent 70%);pointer-events:none;z-index:0}
@keyframes spin{to{transform:rotate(360deg)}}
.site-card{background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden;transition:all .4s;cursor:pointer}
.site-card:hover{transform:translateY(-6px);border-color:var(--cyan);box-shadow:0 20px 60px rgba(0,217,255,.1)}
</style>
</head>
<body>
<div class="glow"></div>
<script src="config.js"></script>
<div style="position:relative;z-index:1;max-width:1280px;margin:0 auto;padding:24px">
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:40px">
<a href="/" style="font-size:1.5rem;font-weight:800;text-decoration:none;color:var(--cyan)">ERGIO</a>
<a href="/" style="padding:10px 24px;border-radius:12px;border:1px solid var(--border);color:#fff;text-decoration:none;font-weight:600">← Back to Builder</a>
</div>
<div style="text-align:center;margin-bottom:48px">
<h1 style="font-size:3rem;font-weight:700;margin:0 0 12px">Website <span style="background:linear-gradient(135deg,var(--cyan),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent">Gallery</span></h1>
<p style="color:rgba(255,255,255,.5);font-size:1.1rem;margin:0">Real websites built by real businesses with ERGIO AI</p>
</div>
<div id="statsBar" style="display:flex;gap:24px;justify-content:center;margin-bottom:40px;flex-wrap:wrap"></div>
<div id="filterChips" style="display:flex;gap:8px;justify-content:center;margin-bottom:32px;flex-wrap:wrap"></div>
<div id="galleryGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:24px">
<div style="grid-column:1/-1;text-align:center;padding:80px 20px;color:rgba(255,255,255,.4)">
<div style="display:inline-block;width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--cyan);border-radius:50%;animation:spin 1s linear infinite"></div>
<p style="margin-top:16px">Loading real websites from ERGIO database...</p>
</div>
</div>
<div id="emptyState" style="display:none;text-align:center;padding:80px 20px">
<div style="font-size:4rem;margin-bottom:16px">🎨</div>
<h2 style="font-size:1.5rem;font-weight:600;margin:0 0 8px">No websites published yet</h2>
<p style="color:rgba(255,255,255,.4);margin:0 0 24px">Be the first to build and publish your website with ERGIO AI!</p>
<a href="/" style="display:inline-block;padding:14px 32px;border-radius:12px;background:linear-gradient(135deg,var(--cyan),var(--purple));color:#000;font-weight:700;text-decoration:none">Build Your Website →</a>
</div>
</div>
<script>
const SUPABASE_URL=window.ERGIO_CONFIG?.supabaseUrl||'';
const SUPABASE_KEY=window.ERGIO_CONFIG?.supabaseAnonKey||'';
let allSites=[]; let activeFilter='all';
async function loadGallery(){
const grid=document.getElementById('galleryGrid');
try{
const res=await fetch(`${SUPABASE_URL}/rest/v1/generated_websites?select=id,business_name,business_type,html_content,brand_colors,created_date&order=created_date.desc&limit=50`,{headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`}});
const data=await res.json();
allSites=(data||[]).filter(s=>s.html_content&&s.html_content.length>200);
if(allSites.length===0){grid.style.display='none';document.getElementById('emptyState').style.display='block';document.getElementById('statsBar').style.display='none';document.getElementById('filterChips').style.display='none';return;}
const categories=[...new Set(allSites.map(s=>s.business_type||'Other'))];
document.getElementById('statsBar').innerHTML=`<div style="padding:12px 20px;border-radius:12px;border:1px solid var(--border);background:var(--card)"><div style="font-size:1.8rem;font-weight:700;color:var(--cyan)">${allSites.length}</div><div style="font-size:.8rem;color:rgba(255,255,255,.4)">Websites Built</div></div><div style="padding:12px 20px;border-radius:12px;border:1px solid var(--border);background:var(--card)"><div style="font-size:1.8rem;font-weight:700;color:var(--purple)">${categories.length}</div><div style="font-size:.8rem;color:rgba(255,255,255,.4)">Business Types</div></div><div style="padding:12px 20px;border-radius:12px;border:1px solid var(--border);background:var(--card)"><div style="font-size:1.8rem;font-weight:700;color:#10B981">100%</div><div style="font-size:.8rem;color:rgba(255,255,255,.4)">AI Generated</div></div>`;
const chips=['all',...categories];
document.getElementById('filterChips').innerHTML=chips.map(c=>`<button onclick="filterGallery('${c}')" style="padding:8px 16px;border-radius:20px;border:1px solid ${c===activeFilter?'var(--cyan)':'var(--border)'};background:${c===activeFilter?'rgba(0,217,255,.1)':'var(--card)'};color:${c===activeFilter?'var(--cyan)':'rgba(255,255,255,.6)'};cursor:pointer;font-size:.85rem;font-weight:600;text-transform:capitalize">${c==='all'?'All Sites':c}</button>`).join('');
renderGallery();
}catch(e){grid.innerHTML=`<div style="grid-column:1/-1;text-align:center;padding:80px 20px;color:rgba(255,255,255,.4)"><div style="font-size:3rem">⚠️</div><p>Could not load gallery.</p></div>`;}
}
function filterGallery(cat){activeFilter=cat;loadGallery();}
function renderGallery(){
const grid=document.getElementById('galleryGrid');
const filtered=activeFilter==='all'?allSites:allSites.filter(s=>(s.business_type||'Other')===activeFilter);
grid.innerHTML=filtered.map(site=>{
const colors=site.brand_colors||['#00D9FF','#8B5CF6'];
const grad=`linear-gradient(135deg, ${colors[0]||'#00D9FF'}, ${colors[1]||'#8B5CF6'})`;
const date=new Date(site.created_date).toLocaleDateString('en-NG',{month:'short',day:'numeric',year:'numeric'});
const safeHtml=(site.html_content||'').replace(/"/g,'&quot;').replace(/</g,'&lt;').slice(0,50000);
return `<div class="site-card"><div style="height:220px;overflow:hidden;position:relative;border-bottom:1px solid var(--border)"><iframe srcdoc="${safeHtml}" style="width:1280px;height:720px;transform:scale(0.265);transform-origin:top left;border:none;pointer-events:none" loading="lazy"></iframe><div style="position:absolute;bottom:0;left:0;right:0;height:60px;background:linear-gradient(transparent,var(--card))"></div></div><div style="padding:20px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px"><h3 style="font-size:1.1rem;font-weight:600;margin:0">${site.business_name||'Untitled'}</h3><span style="padding:4px 10px;border-radius:8px;font-size:.7rem;font-weight:600;background:rgba(0,217,255,.1);color:var(--cyan)">${site.business_type||'Other'}</span></div><p style="color:rgba(255,255,255,.4);font-size:.8rem;margin:0 0 16px">Built ${date}</p><button onclick="remixSite('${site.id}')" style="width:100%;padding:10px;border-radius:10px;border:none;background:${grad};color:#000;font-weight:700;cursor:pointer">⚡ Remix This Site</button></div></div>`;
}).join('');
}
function remixSite(id){const site=allSites.find(s=>s.id===id);if(!site)return;localStorage.setItem('ergio_remix',JSON.stringify({html:site.html_content,businessName:site.business_name,businessType:site.business_type,brandColors:site.brand_colors}));window.location.href='/?remix='+id;}
loadGallery();
</script>
</body>
</html>

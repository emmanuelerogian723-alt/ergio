<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome back — ERGIO</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="../config.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#050508;--surface:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);--cyan:#00D9FF;--green:#00FF9D;--blue:#2563FF;--gold:#FFB800;--text:#F8FAFC;--muted:#94A3B8}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
    .aurora{position:fixed;inset:0;z-index:0;overflow:hidden}
    .blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.3;will-change:transform}
    .blob:nth-child(1){width:400px;height:400px;background:var(--cyan);top:-10%;left:-10%;animation:float1 8s ease-in-out infinite}
    .blob:nth-child(2){width:500px;height:500px;background:var(--green);bottom:-20%;right:-10%;animation:float2 10s ease-in-out infinite}
    .blob:nth-child(3){width:300px;height:300px;background:var(--blue);top:40%;left:50%;animation:float3 12s ease-in-out infinite}
    .blob:nth-child(4){width:200px;height:200px;background:var(--gold);top:20%;right:20%;animation:float4 9s ease-in-out infinite;opacity:.15}
    @keyframes float1{0%,100%{transform:translate(0,0)}50%{transform:translate(40px,30px)}}
    @keyframes float2{0%,100%{transform:translate(0,0)}50%{transform:translate(-30px,-40px)}}
    @keyframes float3{0%,100%{transform:translate(-50%,0)}50%{transform:translate(-30%,20px)}}
    @keyframes float4{0%,100%{transform:translate(0,0)}50%{transform:translate(20px,-30px)}}
    .particles{position:fixed;inset:0;z-index:0;pointer-events:none}
    .particle{position:absolute;width:2px;height:2px;background:var(--cyan);border-radius:50%;opacity:0;animation:particleRise 15s linear infinite}
    @keyframes particleRise{0%{opacity:0;transform:translateY(100vh) scale(0)}10%{opacity:.6}90%{opacity:.6}100%{opacity:0;transform:translateY(-10vh) scale(1)}}
    .auth-container{position:relative;z-index:1;width:100%;max-width:460px;padding:2rem}
    .auth-card{background:rgba(255,255,255,0.03);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border:1px solid var(--border);border-radius:28px;padding:2.5rem;box-shadow:0 20px 60px rgba(0,0,0,.5);position:relative;overflow:hidden}
    .auth-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--cyan),var(--green),transparent);animation:shimmer 3s ease-in-out infinite}
    @keyframes shimmer{0%,100%{opacity:0.3}50%{opacity:1}}
    .auth-logo{display:flex;align-items:center;gap:.6rem;justify-content:center;margin-bottom:.5rem;text-decoration:none}
    .auth-logo img{width:56px;height:56px;border-radius:14px;object-fit:cover}
    .auth-logo span{font-size:1.6rem;font-weight:800;color:var(--text)}
    .auth-tagline{text-align:center;color:var(--muted);font-size:.85rem;margin-bottom:2rem}
    .auth-title{font-size:1.7rem;font-weight:700;text-align:center;margin-bottom:.5rem}
    .auth-title .gradient{background:linear-gradient(135deg,var(--cyan),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .auth-sub{color:var(--muted);text-align:center;margin-bottom:2rem;font-size:.95rem}
    .input-group{margin-bottom:1.1rem;position:relative}
    .input-label{display:block;font-size:.8rem;color:var(--muted);margin-bottom:.4rem;font-weight:500}
    .input-wrap{position:relative}
    .input-field{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:.9rem 1rem .9rem 2.8rem;color:var(--text);font-size:.95rem;outline:none;transition:all .3s;font-family:'Inter',sans-serif}
    .input-field:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,217,255,.1);background:rgba(0,217,255,.02)}
    .input-field::placeholder{color:#475569}
    .input-icon{position:absolute;left:.9rem;top:50%;transform:translateY(-50%);width:20px;height:20px;color:#475569;transition:color .3s}
    .input-wrap:focus-within .input-icon{color:var(--cyan)}
    .pwd-toggle{position:absolute;right:.9rem;top:50%;transform:translateY(-50%);background:none;border:none;color:#475569;cursor:pointer;font-size:.8rem;transition:color .3s}
    .pwd-toggle:hover{color:var(--cyan)}
    .auth-btn{width:100%;padding:.95rem;border:none;border-radius:14px;font-size:1rem;font-weight:700;cursor:pointer;transition:all .3s;margin-top:.5rem;display:flex;align-items:center;justify-content:center;gap:.5rem}
    .btn-primary{background:linear-gradient(135deg,var(--cyan),var(--green));color:#050508}
    .btn-primary:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,217,255,.3)}
    .btn-primary:disabled{opacity:.6;cursor:not-allowed;transform:none}
    .btn-google{background:rgba(255,255,255,0.07);border:1px solid var(--border);color:var(--text);margin-top:.7rem}
    .btn-google:hover{background:rgba(255,255,255,0.12);border-color:rgba(255,255,255,.2)}
    .divider{display:flex;align-items:center;gap:.8rem;margin:1.2rem 0;color:var(--muted);font-size:.8rem}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
    .auth-footer{text-align:center;margin-top:1.5rem;color:var(--muted);font-size:.88rem}
    .auth-footer a{color:var(--cyan);text-decoration:none;font-weight:600}
    .auth-footer a:hover{text-decoration:underline}
    .alert{padding:.8rem 1rem;border-radius:12px;margin-bottom:1rem;font-size:.88rem;display:none;animation:fadeUp .3s ease}
    .alert.show{display:block}
    .alert-error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#fca5a5}
    .alert-success{background:rgba(0,255,157,.1);border:1px solid rgba(0,255,157,.3);color:#6ee7b7}
    .alert-info{background:rgba(0,217,255,.1);border:1px solid rgba(0,217,255,.3);color:#7dd3fc}
    .forgot-link{text-align:right;margin-top:-.6rem;margin-bottom:.8rem}
    .forgot-link a{color:var(--muted);font-size:.8rem;text-decoration:none}
    .forgot-link a:hover{color:var(--cyan)}
    .spinner{width:18px;height:18px;border:2px solid rgba(0,0,0,.2);border-top-color:#050508;border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
    @keyframes spin{to{transform:rotate(360deg)}}
    .success-check{display:none;text-align:center;padding:2rem 0}
    .success-check.show{display:block;animation:fadeUp .5s ease}
    .check-circle{width:80px;height:80px;background:linear-gradient(135deg,var(--cyan),var(--green));border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:2rem;animation:popIn .5s cubic-bezier(.175,.885,.32,1.275)}
    @keyframes popIn{0%{transform:scale(0)}100%{transform:scale(1)}}
    .stats-bar{display:flex;gap:.5rem;margin-top:1.5rem}
    .stat-pill{flex:1;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px;padding:.5rem;text-align:center}
    .stat-num{font-size:1rem;font-weight:700;color:var(--cyan)}
    .stat-lbl{font-size:.65rem;color:var(--muted);margin-top:2px}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .firebase-badge{display:flex;align-items:center;justify-content:center;gap:.4rem;margin-top:1rem;color:var(--muted);font-size:.72rem;opacity:.6}
  </style>
</head>
<body>
  <div class="aurora"><div class="blob"></div><div class="blob"></div><div class="blob"></div><div class="blob"></div></div>
  <div class="particles" id="particles"></div>

  <div class="auth-container">
    <div class="auth-card">
      <a href="../index.html" class="auth-logo">
        <img src="../assets/ergio-logo.jpg" alt="ERGIO" onerror="this.style.display='none'">
        <span>ERGIO</span>
      </a>
      <p class="auth-tagline">Your AI Business Partner</p>

      <div id="alert" class="alert"></div>

      <div id="loginView">
        <h1 class="auth-title">Welcome <span class="gradient">Back</span></h1>
        <p class="auth-sub">Sign in to your ERGIO dashboard</p>

        <form onsubmit="return handleLogin(event)">
          <div class="input-group">
            <label class="input-label">Email address</label>
            <div class="input-wrap">
              <input type="email" id="email" class="input-field" placeholder="you@example.com" required autocomplete="email">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            </div>
          </div>

          <div class="input-group">
            <label class="input-label">Password</label>
            <div class="input-wrap">
              <input type="password" id="password" class="input-field" placeholder="Your password" required autocomplete="current-password">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              <button type="button" class="pwd-toggle" onclick="togglePwd()">Show</button>
            </div>
          </div>

          <div class="forgot-link">
            <a href="#" onclick="sendResetEmail(); return false;">Forgot password?</a>
          </div>

          <button type="submit" class="auth-btn btn-primary" id="loginBtn">
            <span id="loginBtnText">Sign in to ERGIO</span>
          </button>
        </form>

        <div class="divider">or continue with</div>

        <button class="auth-btn btn-google" onclick="signInWithGoogle()">
          <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Continue with Google
        </button>

        <div class="stats-bar">
          <div class="stat-pill"><div class="stat-num" id="stat1">0</div><div class="stat-lbl">Businesses</div></div>
          <div class="stat-pill"><div class="stat-num" id="stat2">0</div><div class="stat-lbl">Leads Found</div></div>
        </div>
      </div>

      <div id="successCheck" class="success-check">
        <div class="check-circle">✓</div>
        <h3 style="margin-bottom:.5rem">You're in!</h3>
        <p style="color:var(--muted);font-size:.9rem">Redirecting to your dashboard...</p>
      </div>

      <div class="auth-footer">
        New to ERGIO? <a href="signup.html">Create your account →</a>
      </div>

      <div class="firebase-badge">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="#FFA000"><path d="M3.89 15.673L6.255.461A.542.542 0 0 1 7.27.289L9.813 5.06 3.89 15.673zm16.795 3.691L18.433 5.365a.54.54 0 0 0-.949-.15L3.89 15.673l7.229 4.067a1.59 1.59 0 0 0 1.524 0l8.042-4.376zm-8.908-6.218l-2.448-4.858a.64.64 0 0 0-1.155.063L4.184 15l7.593-1.854z"/></svg>
        Secured by Firebase Authentication
      </div>
    </div>
  </div>

  <!-- Firebase SDK v10 (modular, compat layer for simplicity) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

  <script>
    // ── Firebase config from ERGIO global config ──
    const FB_CFG = window.ERGIO_CONFIG?.firebase;
    if (!FB_CFG || !FB_CFG.apiKey || FB_CFG.apiKey === 'YOUR_FIREBASE_API_KEY') {
      document.getElementById('alert').className = 'alert show alert-error';
      document.getElementById('alert').textContent = 'Firebase not configured. Contact support.';
    } else {
      firebase.initializeApp(FB_CFG);
    }
    const auth = typeof firebase !== 'undefined' && FB_CFG?.apiKey !== 'YOUR_FIREBASE_API_KEY'
      ? firebase.auth() : null;

    // Particles
    const pc = document.getElementById('particles');
    for (let i = 0; i < 30; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random()*100+'%';
      p.style.animationDelay = Math.random()*15+'s';
      p.style.animationDuration = (10+Math.random()*10)+'s';
      p.style.background = ['#00D9FF','#00FF9D','#2563FF'][Math.floor(Math.random()*3)];
      pc.appendChild(p);
    }

    // Stats animation
    [1247, 3892].forEach((t,i) => {
      let c=0; const step=t/60;
      const timer = setInterval(() => {
        c+=step; if(c>=t){c=t;clearInterval(timer);}
        document.getElementById(`stat${i+1}`).textContent = Math.floor(c).toLocaleString();
      },25);
    });

    function togglePwd() {
      const pwd = document.getElementById('password');
      const btn = pwd.parentElement.querySelector('.pwd-toggle');
      if (pwd.type==='password'){pwd.type='text';btn.textContent='Hide';}
      else{pwd.type='password';btn.textContent='Show';}
    }

    function showAlert(type, msg) {
      const a = document.getElementById('alert');
      a.className = `alert show alert-${type}`;
      a.textContent = msg;
      if (type !== 'info') setTimeout(() => a.classList.remove('show'), 6000);
    }

    // Check existing session on load
    if (auth) {
      auth.onAuthStateChanged(user => {
        if (user) {
          // Already logged in — go to dashboard
          window.location.href = '../dashboard/index.html';
        }
      });
    }

    async function handleLogin(e) {
      if (e) e.preventDefault();
      if (!auth) { showAlert('error','Firebase not initialised. Please refresh.'); return false; }

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const btnText = document.getElementById('loginBtnText');

      if (!email || !password) { showAlert('error','Please enter email and password.'); return false; }

      btn.disabled = true;
      btnText.innerHTML = '<span class="spinner"></span>';

      try {
        await auth.signInWithEmailAndPassword(email, password);
        document.getElementById('loginView').style.display = 'none';
        document.getElementById('successCheck').classList.add('show');
        showAlert('success','Welcome back! Redirecting...');
        setTimeout(() => { window.location.href = '../dashboard/index.html'; }, 1200);
      } catch (err) {
        btn.disabled = false;
        btnText.textContent = 'Sign in to ERGIO';
        let msg = 'Login failed. Please try again.';
        if (err.code === 'auth/user-not-found') msg = 'No account found with this email.';
        else if (err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential') msg = 'Incorrect password. Try again.';
        else if (err.code === 'auth/invalid-email') msg = 'Invalid email address.';
        else if (err.code === 'auth/too-many-requests') msg = 'Too many attempts. Please wait a moment.';
        else if (err.code === 'auth/network-request-failed') msg = 'Network error. Check your connection.';
        showAlert('error', msg);
      }
      return false;
    }

    async function signInWithGoogle() {
      if (!auth) { showAlert('error','Firebase not initialised.'); return; }
      try {
        const provider = new firebase.auth.GoogleAuthProvider();
        provider.addScope('email');
        provider.addScope('profile');
        await auth.signInWithPopup(provider);
        document.getElementById('loginView').style.display = 'none';
        document.getElementById('successCheck').classList.add('show');
        setTimeout(() => { window.location.href = '../dashboard/index.html'; }, 1200);
      } catch (err) {
        if (err.code !== 'auth/popup-closed-by-user') {
          showAlert('error', err.message || 'Google sign-in failed.');
        }
      }
    }

    async function sendResetEmail() {
      const email = document.getElementById('email').value.trim();
      if (!email) { showAlert('info','Enter your email above first.'); return; }
      if (!auth) return;
      try {
        await auth.sendPasswordResetEmail(email);
        showAlert('success',`Password reset email sent to ${email}. Check your inbox.`);
      } catch (err) {
        showAlert('error', err.message || 'Could not send reset email.');
      }
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — ERGIO</title>
  <meta name="description" content="Sign in to your ERGIO dashboard.">
  <link rel="icon" href="../favicon.ico">
  <script src="../config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{--bg:#0A0E14;--surface:#0F141C;--card:#131A23;--border:#1E2730;--text:#E8EEF4;--muted:#8B98A8;--cyan:#00D9FF;--green:#00FF9D;--blue:#2563FF;--red:#FF4757}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
    .particles{position:fixed;inset:0;overflow:hidden;z-index:0;pointer-events:none}
    .particle{position:absolute;width:4px;height:4px;border-radius:50%;opacity:.15;animation:float 15s infinite ease-in-out}
    @keyframes float{0%,100%{transform:translateY(100vh) translateX(0);opacity:0}10%{opacity:.15}90%{opacity:.15}100%{transform:translateY(-10vh) translateX(50px)}}
    .auth-wrap{position:relative;z-index:1;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem}
    .auth-card{width:100%;max-width:440px;background:rgba(255,255,255,0.02);backdrop-filter:blur(40px);border:1px solid var(--border);border-radius:28px;padding:2.5rem;box-shadow:0 20px 60px rgba(0,0,0,.5);position:relative;overflow:hidden}
    .auth-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--cyan),var(--green),transparent);animation:shimmer 3s ease-in-out infinite}
    @keyframes shimmer{0%,100%{opacity:.5}50%{opacity:1}}
    .auth-logo{display:flex;align-items:center;gap:.6rem;justify-content:center;margin-bottom:.5rem;text-decoration:none}
    .auth-logo span{font-size:1.7rem;font-weight:800;color:var(--text);letter-spacing:-.02em}
    .auth-logo .dot{width:10px;height:10px;border-radius:50%;background:var(--green);box-shadow:0 0 12px var(--green)}
    .auth-tagline{text-align:center;color:var(--muted);font-size:.85rem;margin-bottom:1.5rem}
    .auth-title{font-size:1.7rem;font-weight:700;text-align:center;margin-bottom:.5rem}
    .auth-title .gradient{background:linear-gradient(135deg,var(--cyan),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .auth-sub{color:var(--muted);text-align:center;margin-bottom:2rem;font-size:.95rem}
    .input-group{margin-bottom:1.2rem}
    .input-label{display:block;font-size:.8rem;color:var(--muted);margin-bottom:.5rem;font-weight:600}
    .input-wrap{position:relative}
    .input-field{width:100%;padding:.9rem 1rem .9rem 2.8rem;border:1px solid var(--border);border-radius:14px;background:rgba(0,0,0,0.3);color:var(--text);font-size:1rem;transition:all .3s}
    .input-field:focus{outline:none;border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,217,255,.1)}
    .input-icon{position:absolute;left:.9rem;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--muted)}
    .pwd-toggle{position:absolute;right:.9rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:.8rem}
    .forgot-link{text-align:right;margin-bottom:1rem}
    .forgot-link a{color:var(--cyan);text-decoration:none;font-size:.85rem}
    .auth-btn{width:100%;padding:.95rem;border:none;border-radius:14px;font-size:1rem;font-weight:700;cursor:pointer;transition:all .3s;display:flex;align-items:center;justify-content:center;gap:.5rem}
    .btn-primary{background:linear-gradient(135deg,var(--cyan),var(--blue));color:#fff}
    .btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(0,217,255,.3)}
    .btn-primary:disabled{opacity:.6;transform:none}
    .spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
    @keyframes spin{to{transform:rotate(360deg)}}
    .alert{padding:.8rem 1rem;border-radius:12px;margin-bottom:1rem;font-size:.88rem;display:none}
    .alert.show{display:block}
    .alert-error{background:rgba(255,71,87,.1);border:1px solid rgba(255,71,87,.3);color:var(--red)}
    .alert-success{background:rgba(0,255,157,.1);border:1px solid rgba(0,255,157,.3);color:var(--green)}
    .alert-info{background:rgba(0,217,255,.1);border:1px solid rgba(0,217,255,.3);color:var(--cyan)}
    .success-check{text-align:center;padding:2rem 0;display:none}
    .success-check.show{display:block}
    .check-circle{width:72px;height:72px;border-radius:50%;background:rgba(0,255,157,.15);display:flex;align-items:center;justify-content:center;margin:0 auto 1.2rem;font-size:2rem;color:var(--green);animation:pop .4s}
    @keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
    .auth-footer{text-align:center;margin-top:1.5rem;color:var(--muted);font-size:.88rem}
    .auth-footer a{color:var(--cyan);text-decoration:none;font-weight:600}
    .stats-bar{display:flex;gap:1rem;justify-content:center;margin-top:1.5rem}
    .stat-pill{text-align:center}
    .stat-num{font-size:1.3rem;font-weight:800;color:var(--cyan)}
    .stat-lbl{font-size:.72rem;color:var(--muted)}
  </style>
</head>
<body>
  <div class="particles" id="particles"></div>

  <div class="auth-wrap">
    <div class="auth-card">
      <a href="../index.html" class="auth-logo">
        <span class="dot"></span>
        <span>ERGIO</span>
      </a>
      <p class="auth-tagline">Your AI Business Partner</p>

      <h1 class="auth-title">Welcome <span class="gradient">Back</span></h1>
      <p class="auth-sub">Sign in to your ERGIO dashboard</p>

      <div id="alert" class="alert"></div>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="input-group">
          <label class="input-label">Email address</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            <input type="email" id="email" class="input-field" placeholder="you@example.com" required autocomplete="email">
          </div>
        </div>
        <div class="input-group">
          <label class="input-label">Password</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" id="password" class="input-field" placeholder="Your password" required autocomplete="current-password">
            <button type="button" class="pwd-toggle" onclick="togglePwd()">Show</button>
          </div>
        </div>
        <div class="forgot-link">
          <a href="#" onclick="sendResetEmail(); return false;">Forgot password?</a>
        </div>
        <button type="submit" class="auth-btn btn-primary" id="loginBtn">
          <span id="loginBtnText">Sign in to ERGIO</span>
        </button>
      </form>

      <div class="stats-bar">
        <div class="stat-pill"><div class="stat-num" id="stat1">12,847</div><div class="stat-lbl">Businesses</div></div>
        <div class="stat-pill"><div class="stat-num" id="stat2">48,291</div><div class="stat-lbl">Leads Found</div></div>
      </div>

      <div id="successCheck" class="success-check">
        <div class="check-circle">✓</div>
        <h3 style="margin-bottom:.5rem">You're in!</h3>
        <p style="color:var(--muted);font-size:.9rem">Redirecting to your dashboard...</p>
      </div>

      <div class="auth-footer">
        New to ERGIO? <a href="signup.html">Create your account →</a>
      </div>
    </div>
  </div>

  <script>
    const SUPA = window.ERGIO_CONFIG;
    const sb = supabase.createClient(SUPA.supabaseUrl, SUPA.supabaseAnonKey);

    // Particles
    const pc = document.getElementById('particles');
    for (let i = 0; i < 25; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random()*100+'%';
      p.style.animationDelay = Math.random()*15+'s';
      p.style.animationDuration = (10+Math.random()*10)+'s';
      p.style.background = ['#00D9FF','#00FF9D','#2563FF'][Math.floor(Math.random()*3)];
      pc.appendChild(p);
    }

    // Check if already logged in
    sb.auth.getSession().then(({ data: { session } }) => {
      if (session) {
        window.location.href = '../dashboard/index.html';
      }
    });

    // Pre-fill email from URL param
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('email')) {
      document.getElementById('email').value = urlParams.get('email');
    }

    function togglePwd() {
      const pwd = document.getElementById('password');
      const btn = pwd.parentElement.querySelector('.pwd-toggle');
      if (pwd.type==='password'){pwd.type='text';btn.textContent='Hide';}
      else{pwd.type='password';btn.textContent='Show';}
    }

    function showAlert(type, msg) {
      const a = document.getElementById('alert');
      a.className = `alert show alert-${type}`;
      a.textContent = msg;
      setTimeout(() => a.classList.remove('show'), 5000);
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const btnText = document.getElementById('loginBtnText');
      btn.disabled = true;
      btnText.innerHTML = '<span class="spinner"></span> Signing in...';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      try {
        const { data, error } = await sb.auth.signInWithPassword({ email, password });

        if (error) {
          let msg = error.message || 'Login failed.';
          if (msg.includes('Invalid login') || msg.includes('invalid')) msg = 'Wrong email or password.';
          if (msg.includes('not confirmed') || msg.includes('Email not confirmed')) {
            msg = 'Please verify your email first, or try again — your account may still be confirming.';
          }
          showAlert('error', msg);
          btn.disabled = false;
          btnText.textContent = 'Sign in to ERGIO';
          return;
        }

        // Success
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('successCheck').classList.add('show');
        document.querySelector('.stats-bar').style.display = 'none';
        document.querySelector('.auth-footer').style.display = 'none';

        setTimeout(() => { window.location.href = '../dashboard/index.html'; }, 1200);
      } catch (err) {
        showAlert('error', err.message || 'Network error. Try again.');
        btn.disabled = false;
        btnText.textContent = 'Sign in to ERGIO';
      }
    }

    async function sendResetEmail() {
      const email = document.getElementById('email').value.trim();
      if (!email) { showAlert('error', 'Enter your email first.'); return; }
      try {
        const { error } = await sb.auth.resetPasswordForEmail(email, {
          redirectTo: window.location.origin + '/auth/login.html'
        });
        if (error) showAlert('error', error.message);
        else showAlert('success', 'Password reset link sent to ' + email);
      } catch(e) {
        showAlert('error', 'Could not send reset email.');
      }
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
<meta name="google-site-verification" content="GOOGLE_VERIFICATION_CODE_HERE" />
<link rel="icon" type="image/jpeg" href="/ergio/assets/ergio-logo.jpg">
<link rel="apple-touch-icon" href="/ergio/assets/ergio-logo.jpg">
<meta property="og:image" content="https://ergio.vercel.app/ergio/assets/ergio-logo.jpg">
<meta name="robots" content="index, follow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — ERGIO</title>
  <meta name="description" content="Sign in to your ERGIO dashboard.">
  <link rel="icon" href="../favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="../config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <style>
    :root{--bg:#0A0E14;--surface:#0F141C;--card:#131A23;--border:#1E2730;--text:#E8EEF4;--muted:#8B98A8;--cyan:#00D9FF;--green:#00FF9D;--blue:#2563FF;--red:#FF4757}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
    .particles{position:fixed;inset:0;overflow:hidden;z-index:0;pointer-events:none}
    .particle{position:absolute;width:4px;height:4px;border-radius:50%;opacity:.15;animation:float 15s infinite ease-in-out}
    @keyframes float{0%,100%{transform:translateY(100vh) translateX(0);opacity:0}10%{opacity:.15}90%{opacity:.15}100%{transform:translateY(-10vh) translateX(50px)}}
    .auth-wrap{position:relative;z-index:1;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem}
    .auth-card{width:100%;max-width:440px;background:rgba(255,255,255,0.02);backdrop-filter:blur(40px);border:1px solid var(--border);border-radius:28px;padding:2.5rem;box-shadow:0 20px 60px rgba(0,0,0,.5);position:relative;overflow:hidden}
    .auth-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--cyan),var(--green),transparent);animation:shimmer 3s ease-in-out infinite}
    @keyframes shimmer{0%,100%{opacity:.5}50%{opacity:1}}
    .auth-logo{display:flex;align-items:center;gap:.6rem;justify-content:center;margin-bottom:.5rem;text-decoration:none}
    .auth-logo span{font-size:1.7rem;font-weight:800;color:var(--text);letter-spacing:-.02em}
    .auth-logo .dot{width:10px;height:10px;border-radius:50%;background:var(--green);box-shadow:0 0 12px var(--green)}
    .auth-tagline{text-align:center;color:var(--muted);font-size:.85rem;margin-bottom:1.5rem}
    .auth-title{font-size:1.7rem;font-weight:700;text-align:center;margin-bottom:.5rem}
    .auth-title .gradient{background:linear-gradient(135deg,var(--cyan),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .auth-sub{color:var(--muted);text-align:center;margin-bottom:2rem;font-size:.95rem}
    .input-group{margin-bottom:1.2rem}
    .input-label{display:block;font-size:.8rem;color:var(--muted);margin-bottom:.5rem;font-weight:600}
    .input-wrap{position:relative}
    .input-field{width:100%;padding:.9rem 1rem .9rem 2.8rem;border:1px solid var(--border);border-radius:14px;background:rgba(0,0,0,0.3);color:var(--text);font-size:1rem;transition:all .3s}
    .input-field:focus{outline:none;border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,217,255,.1)}
    .input-icon{position:absolute;left:.9rem;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--muted)}
    .pwd-toggle{position:absolute;right:.9rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:.8rem}
    .auth-btn{width:100%;padding:.95rem;border:none;border-radius:14px;font-size:1rem;font-weight:700;cursor:pointer;transition:all .3s;display:flex;align-items:center;justify-content:center;gap:.5rem;margin-top:.5rem}
    .btn-primary{background:linear-gradient(135deg,var(--cyan),var(--blue));color:#fff}
    .btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(0,217,255,.3)}
    .btn-primary:disabled{opacity:.6;transform:none}
    .alert{padding:.8rem 1rem;border-radius:12px;margin-bottom:1rem;font-size:.88rem;display:none}
    .alert.show{display:block}
    .alert-error{background:rgba(255,71,87,.1);border:1px solid rgba(255,71,87,.3);color:var(--red)}
    .alert-success{background:rgba(0,255,157,.1);border:1px solid rgba(0,255,157,.3);color:var(--green)}
    .alert-info{background:rgba(0,217,255,.1);border:1px solid rgba(0,217,255,.3);color:var(--cyan)}
    .spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
    @keyframes spin{to{transform:rotate(360deg)}}
    .auth-footer{text-align:center;margin-top:1.5rem;color:var(--muted);font-size:.88rem}
    .auth-footer a{color:var(--cyan);text-decoration:none;font-weight:600}
    .forgot-link{display:block;text-align:right;color:var(--cyan);font-size:.85rem;text-decoration:none;margin-bottom:1.5rem;cursor:pointer}
    .firebase-badge{display:flex;align-items:center;justify-content:center;gap:.4rem;margin-top:1rem;color:var(--muted);font-size:.72rem;opacity:.6}
    .metrics{display:flex;justify-content:center;gap:2rem;margin-top:2rem;padding-top:1.5rem;border-top:1px solid var(--border)}
    .metric{text-align:center}
    .metric .num{font-size:1.5rem;font-weight:800;color:var(--cyan)}
    .metric .label{font-size:.8rem;color:var(--muted);margin-top:.2rem}
  </style>
</head>
<body>
  <div class="particles" id="particles"></div>
  <div class="auth-wrap">
    <div class="auth-card">
      <a href="../index.html" class="auth-logo">
        <div class="dot"></div>
        <span>ERGIO</span>
      </a>
      <p class="auth-tagline">Your AI Business Partner</p>

      <h1 class="auth-title">Welcome <span class="gradient">Back</span></h1>
      <p class="auth-sub">Sign in to your ERGIO dashboard</p>

      <div class="alert" id="alert"></div>

      <div class="input-group">
        <label class="input-label">Email address</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16v16H4z"/><path d="M22 6l-10 7L2 6"/></svg>
          <input type="email" class="input-field" id="email" placeholder="you@example.com" autocomplete="email">
        </div>
      </div>

      <div class="input-group">
        <label class="input-label">Password</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" class="input-field" id="password" placeholder="Your password" autocomplete="current-password">
          <button class="pwd-toggle" onclick="togglePwd()">Show</button>
        </div>
      </div>

      <span class="forgot-link" onclick="resetPassword()">Forgot password?</span>

      <button class="auth-btn btn-primary" id="loginBtn" onclick="doLogin(event)">
        <span id="loginBtnText">Sign in to ERGIO</span>
      </button>

      <div class="auth-footer">
        New to ERGIO? <a href="signup.html">Create your account →</a>
      </div>

      <div class="metrics">
        <div class="metric"><div class="num">12,847</div><div class="label">Businesses</div></div>
        <div class="metric"><div class="num">48,291</div><div class="label">Leads Found</div></div>
      </div>

      <div class="firebase-badge">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="#FFA000"><path d="M3.89 15.673L6.255.461A.542.542 0 0 1 7.27.289L9.813 5.06 3.89 15.673zm16.795 3.691L18.433 5.365a.54.54 0 0 0-.949-.15L3.89 15.673l7.229 4.067a1.59 1.59 0 0 0 1.524 0l8.042-4.376zm-8.908-6.218l-2.448-4.858a.64.64 0 0 0-1.155.063L4.184 15l7.593-1.854z"/></svg>
        Secured by Firebase Authentication
      </div>
    </div>
  </div>

  <script>
    // ── Firebase Init ──
    const FB_CFG = window.ERGIO_CONFIG.firebase;
    firebase.initializeApp(FB_CFG);
    const auth = firebase.auth();

    // ── Particles ──
    const pc = document.getElementById('particles');
    for (let i = 0; i < 25; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random()*100+'%';
      p.style.animationDelay = Math.random()*15+'s';
      p.style.animationDuration = (10+Math.random()*10)+'s';
      p.style.background = ['#00D9FF','#00FF9D','#2563FF'][Math.floor(Math.random()*3)];
      pc.appendChild(p);
    }

    function showAlert(type, msg) {
      const a = document.getElementById('alert');
      a.className = 'alert show alert-' + type;
      a.textContent = msg;
      if (type !== 'info') setTimeout(() => a.classList.remove('show'), 6000);
    }

    function togglePwd() {
      const pwd = document.getElementById('password');
      const btn = pwd.parentElement.querySelector('.pwd-toggle');
      if (pwd.type === 'password') { pwd.type = 'text'; btn.textContent = 'Hide'; }
      else { pwd.type = 'password'; btn.textContent = 'Show'; }
    }

    // ── Check existing Firebase session ──
    const redirectAfterAuth = () => {
      const params = new URLSearchParams(window.location.search);
      const promptVal = params.get('prompt');
      if (promptVal) {
        localStorage.setItem('ergio_initial_prompt', promptVal);
        window.location.href = '../build.html';
      } else {
        window.location.href = '../dashboard/index.html';
      }
    };
    auth.onAuthStateChanged((user) => {
      if (user) {
        // Already logged in — redirect
        localStorage.setItem('ergio_user', JSON.stringify({
          uid: user.uid,
          email: user.email,
          fullName: user.displayName || user.email.split('@')[0]
        }));
        redirectAfterAuth();
      }
    });

    // Pre-fill email if passed from signup
    const params = new URLSearchParams(window.location.search);
    if (params.get('email')) {
      document.getElementById('email').value = params.get('email');
    }

    // ── FIREBASE LOGIN ──
    async function doLogin(e) {
      if (e) e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const btnText = document.getElementById('loginBtnText');
      btn.disabled = true;
      btnText.innerHTML = '<span class="spinner"></span> Signing in...';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showAlert('error', 'Please enter your email and password.');
        btn.disabled = false;
        btnText.textContent = 'Sign in to ERGIO';
        return;
      }

      try {
        const cred = await auth.signInWithEmailAndPassword(email, password);

        // Store user info
        localStorage.setItem('ergio_user', JSON.stringify({
          uid: cred.user.uid,
          email: cred.user.email,
          fullName: cred.user.displayName || cred.user.email.split('@')[0]
        }));

        showAlert('success', 'Welcome back! Redirecting...');
        setTimeout(() => { redirectAfterAuth(); }, 800);
      } catch (err) {
        btn.disabled = false;
        btnText.textContent = 'Sign in to ERGIO';
        let msg = err.message || 'Login failed.';
        if (msg.includes('wrong-password') || msg.includes('invalid-credential')) msg = 'Incorrect email or password.';
        if (msg.includes('user-not-found')) msg = 'No account found with this email. Try signing up.';
        if (msg.includes('too-many-requests')) msg = 'Too many attempts. Try again in a few minutes.';
        if (msg.includes('invalid-email')) msg = 'Please enter a valid email address.';
        showAlert('error', msg);
      }
    }

    // ── Password Reset ──
    async function resetPassword() {
      const email = document.getElementById('email').value.trim();
      if (!email) {
        showAlert('info', 'Enter your email first, then click "Forgot password?"');
        return;
      }
      try {
        await auth.sendPasswordResetEmail(email);
        showAlert('success', 'Password reset email sent! Check your inbox.');
      } catch (err) {
        showAlert('error', 'Could not send reset email. ' + err.message);
      }
    }
  </script>
<script src="/guide-widget.js"></script>
  </body>
</html>

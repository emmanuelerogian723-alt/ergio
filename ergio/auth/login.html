<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — ERGIO</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../config.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#050508;--surface:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);--cyan:#00D9FF;--green:#00FF9D;--blue:#2563FF;--text:#F8FAFC;--muted:#94A3B8}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
    .aurora{position:fixed;inset:0;z-index:0;overflow:hidden}
    .blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.3}
    .blob:nth-child(1){width:400px;height:400px;background:var(--cyan);top:-10%;left:-10%;animation:float1 8s ease-in-out infinite}
    .blob:nth-child(2){width:500px;height:500px;background:var(--green);bottom:-20%;right:-10%;animation:float2 10s ease-in-out infinite}
    .blob:nth-child(3){width:300px;height:300px;background:var(--blue);top:40%;left:50%;animation:float3 12s ease-in-out infinite}
    @keyframes float1{0%,100%{transform:translate(0,0)}50%{transform:translate(40px,30px)}}
    @keyframes float2{0%,100%{transform:translate(0,0)}50%{transform:translate(-30px,-40px)}}
    @keyframes float3{0%,100%{transform:translate(-50%,0)}50%{transform:translate(-30%,20px)}}
    .auth-container{position:relative;z-index:1;width:100%;max-width:440px;padding:2rem}
    .auth-card{background:rgba(255,255,255,0.03);backdrop-filter:blur(40px);border:1px solid var(--border);border-radius:24px;padding:2.5rem;box-shadow:0 20px 60px rgba(0,0,0,.5)}
    .auth-logo{display:flex;align-items:center;gap:.6rem;justify-content:center;margin-bottom:1.5rem;text-decoration:none}
    .auth-logo img{width:48px;height:48px;border-radius:12px}
    .auth-logo span{font-size:1.5rem;font-weight:800;color:var(--text)}
    .auth-title{font-size:1.6rem;font-weight:700;text-align:center;margin-bottom:.5rem}
    .auth-sub{color:var(--muted);text-align:center;margin-bottom:2rem;font-size:.95rem}
    .input-group{margin-bottom:1rem}
    .input-label{display:block;font-size:.8rem;color:var(--muted);margin-bottom:.4rem;font-weight:500}
    .input-field{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:.85rem 1rem;color:var(--text);font-size:.95rem;outline:none;transition:all .3s}
    .input-field:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,217,255,.1)}
    .input-field::placeholder{color:#475569}
    .auth-btn{width:100%;padding:.9rem;border:none;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer;transition:all .3s;margin-top:.5rem}
    .btn-primary{background:linear-gradient(135deg,var(--cyan),var(--green));color:#09090B}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(0,217,255,.3)}
    .btn-google{background:var(--surface);border:1px solid var(--border);color:var(--text);display:flex;align-items:center;justify-content:center;gap:.6rem}
    .btn-google:hover{background:rgba(255,255,255,.06)}
    .auth-divider{display:flex;align-items:center;gap:1rem;margin:1.5rem 0;color:#475569;font-size:.8rem}
    .auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--border)}
    .magic-link{text-align:center;margin-top:1rem}
    .magic-link a{color:var(--cyan);text-decoration:none;font-size:.85rem}
    .magic-link a:hover{text-decoration:underline}
    .auth-footer{text-align:center;margin-top:1.5rem;font-size:.9rem;color:var(--muted)}
    .auth-footer a{color:var(--cyan);text-decoration:none;font-weight:600}
    .alert{padding:.8rem 1rem;border-radius:10px;margin-bottom:1rem;font-size:.85rem;display:none}
    .alert-error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#f87171}
    .alert-success{background:rgba(0,255,157,.1);border:1px solid rgba(0,255,157,.3);color:var(--green)}
    .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(9,9,11,.3);border-top-color:#09090B;border-radius:50%;animation:spin .6s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .back-home{position:fixed;top:1.5rem;left:1.5rem;z-index:2;color:var(--muted);text-decoration:none;font-size:.9rem;display:flex;align-items:center;gap:.3rem}
    .back-home:hover{color:var(--cyan)}
  </style>
</head>
<body>
  <div class="aurora">
    <div class="blob"></div><div class="blob"></div><div class="blob"></div>
  </div>

  <a href="../index.html" class="back-home">← ERGIO</a>

  <div class="auth-container">
    <div class="auth-card">
      <a href="../index.html" class="auth-logo">
        <img src="https://media.base44.com/images/public/whatsapp/6a56e5b5f88d60b0fb2a0007/your_agent/6a56e5b5f88d60b0fb2a0008/c0d1985c5_whatsapp_image_2154745675070690.jpg" alt="ERGIO">
        <span>ERGIO</span>
      </a>
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-sub">Sign in to your business dashboard</p>

      <div class="alert alert-error" id="alertError"></div>
      <div class="alert alert-success" id="alertSuccess"></div>

      <button class="auth-btn btn-google" id="googleBtn" onclick="signInWithGoogle()">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </button>

      <div class="auth-divider">or sign in with email</div>

      <form id="loginForm" onsubmit="return signIn(event)">
        <div class="input-group">
          <label class="input-label">Email</label>
          <input type="email" class="input-field" id="email" placeholder="you@example.com" required autocomplete="email"/>
        </div>
        <div class="input-group">
          <label class="input-label">Password</label>
          <input type="password" class="input-field" id="password" placeholder="••••••••" required autocomplete="current-password"/>
        </div>
        <button type="submit" class="auth-btn btn-primary" id="loginBtn">Sign in</button>
      </form>

      <div class="magic-link">
        <a href="#" onclick="sendMagicLink();return false">Send me a magic link instead ✨</a>
      </div>

      <p class="auth-footer">No account yet? <a href="signup.html">Create one free</a></p>
    </div>
  </div>

  <script>
    let supabase;

    function initSupabase() {
      const cfg = window.ERGIO_CONFIG;
      if (!cfg || !cfg.supabaseUrl || cfg.supabaseUrl.includes('YOUR_')) {
        showAlert('error', 'Supabase not configured. Add your credentials to config.js');
        return false;
      }
      supabase = window.supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);
      return true;
    }

    function showAlert(type, msg) {
      const el = document.getElementById(type === 'error' ? 'alertError' : 'alertSuccess');
      const other = document.getElementById(type === 'error' ? 'alertSuccess' : 'alertError');
      other.style.display = 'none';
      el.textContent = msg;
      el.style.display = 'block';
    }

    async function signIn(e) {
      e.preventDefault();
      if (!initSupabase()) return;

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');

      btn.innerHTML = '<span class="spinner"></span>';
      btn.disabled = true;

      const { data, error } = await supabase.auth.signInWithPassword({ email, password });

      btn.innerHTML = 'Sign in';
      btn.disabled = false;

      if (error) {
        showAlert('error', error.message);
      } else {
        showAlert('success', 'Welcome back! Redirecting...');
        setTimeout(() => window.location.href = '../dashboard/index.html', 800);
      }
    }

    async function signInWithGoogle() {
      if (!initSupabase()) return;
      await supabase.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.origin + '/dashboard/index.html' }
      });
    }

    async function sendMagicLink() {
      if (!initSupabase()) return;
      const email = document.getElementById('email').value;
      if (!email) { showAlert('error', 'Enter your email first'); return; }

      const { error } = await supabase.auth.signInWithOtp({ email });
      if (error) {
        showAlert('error', error.message);
      } else {
        showAlert('success', 'Check your email for a magic link ✨');
      }
    }

    // Check if already logged in
    (async () => {
      if (initSupabase()) {
        const { data: { session } } = await supabase.auth.getSession();
        if (session) {
          window.location.href = '../dashboard/index.html';
        }
      }
    })();
  </script>
</body>
</html>
